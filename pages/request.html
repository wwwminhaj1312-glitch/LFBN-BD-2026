<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Request | LFBN-BD 2026</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="find-blood-header">

    <div>
        <i class="fa-solid fa-arrow-left"></i>
    </div>

    <div>🩸 Blood Request</div>

    <div>
        <i class="fa-solid fa-hand-holding-droplet"></i>
    </div>

</div>

<div class="request-container">

    <h2>নতুন রক্তের আবেদন</h2>

    <form id="requestForm">

        <input type="text" id="patientName" placeholder="রোগীর নাম" required>

        <select id="bloodGroup" required>
            <option value="">রক্তের গ্রুপ নির্বাচন করুন</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>
        </select>

        <input type="number" id="bags" placeholder="কত ব্যাগ রক্ত লাগবে?" required>

        <input type="text" id="hospital" placeholder="হাসপাতালের নাম" required>

        <textarea id="problem" placeholder="রোগীর সমস্যার বিবরণ লিখুন" rows="4" required></textarea>

        <input type="tel" id="phone" placeholder="যোগাযোগ নম্বর" required>

        <button type="submit">
            <i class="fa-solid fa-paper-plane"></i>
            Request Blood
        </button>

    </form>

</div>

<script src="../script.js"></script>

</body>
</html>
