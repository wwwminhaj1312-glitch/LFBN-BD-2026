<header class="request-header">
    <a href="javascript:history.back()" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <h1>Blood Request</h1>

    <div class="header-icon">
        <i class="fa-solid fa-heart-circle-plus"></i>
    </div>
</header>

<div class="quote-card">
    <img src="../images/blood-drop.png" alt="Blood">

    <div class="quote-text">
        <h2>আমার রক্ত তোমার তরে,</h2>
        <p>জীবন বাঁচুক নতুন করে। 🩸</p>
    </div>
</div>

<h2 class="form-title">
    🩸 রক্তের জন্য আবেদন 🩸
</h2>

<div class="request-container">

<form id="requestForm">

    <div class="input-box">
        <label>💁‍♂️ রোগীর সমস্যা:</label>
        <textarea id="problem" placeholder="এখানে লিখুন..." required></textarea>
    </div>

    <div class="input-box">
        <label>🩸 রক্তের গ্রুপ:</label>
        <select id="bloodGroup" required>
            <option value="">রক্তের গ্রুপ নির্বাচন করুন</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>
        </select>
    </div>

    <div class="input-box">
        <label>💉 রক্তের পরিমাণ:</label>
        <input type="number" id="bags" placeholder="কত ব্যাগ রক্ত প্রয়োজন?" required>
    </div>

    <div class="input-box">
        <label>🩸 হিমোগ্লোবিন:</label>
        <input type="text" id="hemoglobin" placeholder="হিমোগ্লোবিন লিখুন">
    </div>

    <div class="input-box">
        <label>📅 রক্তদানের তারিখ:</label>
        <input type="date" id="date" required>
    </div>

    <div class="input-box">
        <label>⌚ রক্তদানের সময়:</label>
        <input type="time" id="time" required>
    </div>

    <div class="input-box">
        <label>🏥 রক্তদানের স্থান:</label>
        <input type="text" id="place" placeholder="স্থান লিখুন" required>
    </div>

    <div class="input-box">
        <label>☎️ যোগাযোগ:</label>
        <input type="tel" id="phone" placeholder="মোবাইল নম্বর লিখুন" required>
    </div>

    <div class="warning-box">
        ⚠️ <b>সতর্কতা:</b> ভুল তথ্য প্রদান করবেন না। জরুরি প্রয়োজনে শুধুমাত্র রক্তের জন্য আবেদন করুন।
    </div>

    <button type="submit" class="publish-btn">
        🩸 রক্তের আবেদন পাবলিশ করুন
    </button>

</form>

</div>
